name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 Baixa o Dalamud manualmente (SOLUÇÃO DEFINITIVA)
      - name: Download Dalamud
        run: |
          mkdir .dalamud
          curl -L https://goatcorp.github.io/dalamud-distrib/latest.zip -o dalamud.zip
          tar -xf dalamud.zip -C .dalamud

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Publish
        run: dotnet publish -c Release -o publish

      - name: Zip
        run: Compress-Archive -Path publish\* -DestinationPath ESTClock.zip

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: ESTClock.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}