name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 🔥 limpa qualquer lixo de cache / nuget quebrado
      - name: Clear NuGet
        run: dotnet nuget locals all --clear

      # 🔥 baixa Dalamud manual
      - name: Download Dalamud
        run: |
          mkdir .dalamud
          curl -L https://goatcorp.github.io/dalamud-distrib/latest.zip -o dalamud.zip
          tar -xf dalamud.zip -C .dalamud

      - name: Restore
        run: dotnet restore --no-cache

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o publish --no-build

      - name: Zip
        run: Compress-Archive -Path publish\* -DestinationPath ESTClock.zip

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: ESTClock.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}